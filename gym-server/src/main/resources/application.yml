server:
  port: 8080
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gym_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
gym:
  jwt:
    secret: gym-management-system-jwt-secret-key-2024
    expiration: 86400000
  upload:
    path: ${FILE_UPLOAD_PATH:d:/Qoder/work/upload/}
    image-max-size: 10485760
    video-max-size: 209715200
ai:
  qianwen:
    api-key: sk-797b6daa0d4d4e94968f8de750a17da0
    model: qwen-turbo
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
